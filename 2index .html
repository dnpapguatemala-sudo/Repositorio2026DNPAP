    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #192854; --accent: #4eb4e1; --bg: #f4f9ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; }
        .main-logo { width: 180px; margin-bottom: 15px; }
        header h1 { font-size: 28px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .search-box { position: relative; max-width: 600px; margin: 0 auto 50px; }
        .search-box input { width: 100%; padding: 15px 55px; border-radius: 35px; border: 2px solid #ddd; outline: none; font-size: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .search-box i { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: space-between; height: 340px; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .icon-wrapper { height: 160px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .icon-wrapper img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card h3 { font-size: 14px; font-weight: 700; margin: 10px 0; line-height: 1.3; }
        .btn-view { background: #f0f7ff; color: var(--primary); padding: 8px; border-radius: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: auto; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        .modal-content { background: white; margin: 2% auto; padding: 40px; width: 90%; max-width: 1100px; border-radius: 25px; position: relative; }
        .close { position: absolute; right: 25px; top: 15px; font-size: 35px; cursor: pointer; }
        .landing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; margin-top: 30px; }
        .doc-item { background: #fff; border-radius: 15px; border: 1px solid #eee; padding: 15px; text-align: center; }
        .doc-cover-box { width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; overflow: hidden; }
        .doc-cover-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .doc-title { font-size: 12px; font-weight: 700; min-height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; color: #333; }
        .btn-pdf { display: block; background: var(--primary); color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: bold; }

        @media (max-width: 600px) {
            body { padding: 12px; }
            header h1 { font-size: 18px; }
            .main-logo { width: 120px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .card { height: auto; min-height: 260px; padding: 14px; }
            .icon-wrapper { height: 110px; }
            .modal-content { padding: 20px 15px; width: 95%; margin: 5% auto; }
            .landing-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            .doc-cover-box { height: 180px; }
            .close { font-size: 28px; right: 15px; top: 10px; }
        }
    </style>
</head>

function renderCards() {
    const grid = document.getElementById('programGrid');
    if(!grid) return;
    grid.innerHTML = "";
    
    const term = document.getElementById('searchInput').value.toLowerCase();

    data.forEach((p, index) => {
        const matchPrograma = p.name.toLowerCase().includes(term);
        const matchDocumento = p.docs.some(doc => doc.t.toLowerCase().includes(term));

        if (matchPrograma || matchDocumento) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModal(index);
            const thumb = (p.id && iconosLocales[p.id]) ? iconosLocales[p.id] : 'img/default.jpg';
            card.innerHTML = `
                <div class="icon-wrapper"><img src="${thumb}" onerror="this.src='img/default.jpg'"></div>
                <h3>${p.name}</h3>
                <div class="btn-view">${matchDocumento && !matchPrograma ? 'Documento Encontrado' : 'Ver Documentos'}</div>
            `;
            grid.appendChild(card);
        }
    });

    if (grid.innerHTML === "") {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #666;">No se encontraron resultados para "${term}"</div>`;
    }
}

function filterPrograms() {
    renderCards();
}

function openModal(idx) {
    const p = data[idx];
    const modalTitle = document.getElementById('modalTitle');
    const container = document.getElementById('landingContent');
    
    modalTitle.innerText = p.name;
    container.innerHTML = ""; 

    if (p.docs.length === 0) {
        container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding: 40px; color: #666;'>Próximamente archivos disponibles.</p>";
    } else {
        p.docs.forEach(doc => {
            const docThumb = (doc.img && doc.img !== "default") 
                ? `https://drive.google.com/thumbnail?id=${doc.img}&sz=w500` 
                : 'img/default.jpg';

            const docItem = document.createElement('div');
            docItem.className = 'doc-item';
            docItem.innerHTML = `
                <div class="doc-cover-box"><img src="${docThumb}" onerror="this.src='img/default.jpg'"></div>
                <div class="doc-title">${doc.t}</div>
                <a href="https://drive.google.com/file/d/${doc.pdf}/view" target="_blank" class="btn-pdf">VER DOCUMENTO</a>
            `;
            container.appendChild(docItem);
        });
    }

    document.getElementById('myModal').style.display = "block";
    document.body.style.overflow = "hidden";
}

function closeModal() {
    document.getElementById('myModal').style.display = "none";
    document.body.style.overflow = "auto";
}

window.onclick = (event) => {
    if (event.target == document.getElementById('myModal')) closeModal();
}

renderCards();
</script>
